name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR to avoid wasting CI minutes.
concurrency:
  group: ci-$
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No cache: the mirror ships without a lockfile (source of truth is a
          # pnpm monorepo). `npm install` resolves from package.json.

      - name: Install dependencies
        run: 'npm install --no-audit --no-fund'

      - name: Run lint
        run: 'npm run lint'

      - name: Run build
        run: 'npm run build'

      # NOTE: @n8n/scan-community-package resolves packages by their published
      # npm name, not from a local path, so it cannot run in pre-publish CI.
      # Run it manually against the published package after each release:
      #   npx @n8n/scan-community-package n8n-nodes-aurentia
      # The lint step above already enforces the same community-node rules.
